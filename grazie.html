<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grazie — FVS Software</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #2563EB;
      --accent-light: #EFF6FF;
      --blue-100: #DBEAFE;
      --blue-400: #60A5FA;
      --ink: #0D1B2A;
      --ink-soft: #3A526A;
      --surface: #F8FAFD;
      --border: #E2EBF4;
      --border-strong: #C5D8EE;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--accent-light);
      border: 1px solid var(--blue-100);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }
    h1 strong { font-weight: 500; color: var(--accent); }
    p {
      font-size: 15px;
      color: var(--ink-soft);
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #1D4ED8; }
    .footer-note {
      margin-top: 28px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: #93C5FD;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M6 14l6 6L22 8" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="label">messaggio ricevuto</div>
    <h1>Grazie per<br><strong>avermi scritto.</strong></h1>
    <p>Ho ricevuto la tua richiesta. Ti rispondo entro 24 ore con una proposta concreta.</p>
    <a href="https://fvezzanisoftware.github.io" class="btn">Torna al sito</a>
    <div class="footer-note">FVS Software · Correggio (RE)</div>
  </div>
</body>
</html>
